name: Weekly Model Training

on:
  schedule:
    # Run at 00:00 UTC every Saturday
    - cron: '0 0 * * 6'
  workflow_dispatch: # Allow manual trigger

jobs:
  train-model:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Run training script
      env:
        DATABASE_URL: ${{ secrets.DATABASE_URL }}
        HF_TOKEN: ${{ secrets.HF_TOKEN }}
        # Set this if you want the script to know your repo directly, 
        # otherwise ensure it's correct in dataset.py's CONFIG
        HF_MODEL_REPO: ${{ secrets.HF_MODEL_REPO }} 
      run: |
        python train.py
